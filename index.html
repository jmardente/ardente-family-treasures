<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Ardente Family Treasures — home of Cora's Ocean Adventures." />
  <title>Ardente Family Treasures</title>
  <link rel="preload" href="assets/ardente-homepage.png" as="image" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="site-shell" aria-label="Ardente Family Treasures website">
    <div class="artboard" id="artboard">
      <img
        class="page-art"
        src="assets/ardente-homepage.png"
        width="1402"
        height="1122"
        alt="Ardente Family Treasures underwater homepage featuring Cora, Seymour, Jackie the mermaid, Miss Octavia, and Cora and the Coral Reef."
      />

      <!-- TOP NAVIGATION -->
      <a class="hotspot home" href="#top" aria-label="Home"></a>
      <a class="hotspot books" href="#featured-book" aria-label="Books"></a>
      <a class="hotspot shop" data-link="stripe" href="#" aria-label="Shop"></a>
      <a class="hotspot about" href="#about" aria-label="About"></a>
      <a class="hotspot events" href="#events" aria-label="Events"></a>
      <a class="hotspot contact" data-link="email" href="#" aria-label="Contact"></a>
      <a class="hotspot facebook-top" data-link="facebook" href="#" target="_blank" rel="noopener" aria-label="Facebook"></a>

      <!-- HERO BUTTONS -->
      <a class="hotspot meet-cora" href="#featured-book" aria-label="Meet Cora"></a>
      <a class="hotspot explore-shop" data-link="stripe" href="#" aria-label="Explore the shop"></a>

      <!-- LOWER BUTTONS -->
      <a class="hotspot facebook-lower" data-link="facebook" href="#" target="_blank" rel="noopener" aria-label="Follow us on Facebook"></a>
      <a class="hotspot amazon" data-link="amazon" href="#" target="_blank" rel="noopener" aria-label="Buy Cora and the Coral Reef on Amazon"></a>
      <a class="hotspot email-us" data-link="email" href="#" aria-label="Email us"></a>
      <a class="hotspot learn-more" href="#featured-book" aria-label="Learn more about Cora and the Coral Reef"></a>

      <!-- FOOTER QUICK LINKS -->
      <a class="hotspot footer-home" href="#top" aria-label="Footer Home"></a>
      <a class="hotspot footer-books" href="#featured-book" aria-label="Footer Books"></a>
      <a class="hotspot footer-shop" data-link="stripe" href="#" aria-label="Footer Shop"></a>
      <a class="hotspot footer-about" href="#about" aria-label="Footer About"></a>
      <a class="hotspot footer-events" href="#events" aria-label="Footer Events"></a>
      <a class="hotspot footer-contact" data-link="email" href="#" aria-label="Footer Contact"></a>
      <a class="hotspot footer-facebook" data-link="facebook" href="#" target="_blank" rel="noopener" aria-label="Footer Facebook"></a>
      <a class="hotspot footer-amazon" data-link="amazon" href="#" target="_blank" rel="noopener" aria-label="Footer Amazon"></a>
      <a class="hotspot footer-email" data-link="email" href="#" aria-label="Footer Email"></a>

      <!-- Invisible anchors keep the screenshot-perfect design while making sections linkable. -->
      <span id="top" class="anchor anchor-top"></span>
      <span id="featured-book" class="anchor anchor-book"></span>
      <span id="about" class="anchor anchor-about"></span>
      <span id="events" class="anchor anchor-events"></span>
    </div>
  </main>

  <div class="setup-note" id="setupNote" role="status" hidden>
    Add your real Stripe link in <strong>site-config.js</strong> to activate checkout.
  </div>

  <script src="site-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
